# SFT Training Configuration for Llama3.2-1B-Instruct Function Calling

model:
  model_name: "Llama-3.2-1B-Instruct"
  model_id: "AI-ModelScope/Llama-3.2-1B-Instruct"  # ModelScope compatible
  cache_dir: "./models/pretrained"

training:
  output_dir: "./models/checkpoints/sft_ablation2_param_func_refusal_teacher"
  num_train_epochs: 3 
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 24  # Effective batch size = 1*32=32
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 17  # 约等于当前 8194 train samples / batch 2 / grad_accum 24 / 1 epoch 的 10%
  max_grad_norm: 1.0
  weight_decay: 0.01
  max_seq_length: 1024
  resume_from_checkpoint: false
  dataloader_num_workers: 0

optimization:  
  optim: "paged_adamw_8bit"
  max_seq_length: 1024
  bf16: True  # Use bf16 when the GPU supports it
  fp16: false
  gradient_checkpointing: true

lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]  # 全量模块微调（推荐，效果最好）
  lora_bias: "none"
  task_type: "CAUSAL_LM"

logging:
  logging_steps: 5
  save_steps: 46
  eval_steps: 46
  save_total_limit: 20
  log_level: "info"
  # report_to: ["tensorboard", "wandb"]
  report_to: "wandb"

data:
  dataset_name: "Team-ACE/ToolACE"
  structured_dataset_path: "./data/tool_ace_processed"
  refusal_teacher_dataset_path: "./data/ablation_refusal_teacher_deepseek/dataset"
  processed_train_path: "./data/train/train_abalation2_param_func_refusal_teacher"
  processed_validation_path: "./data/eval/eval_abalation2_param_func_refusal_teacher"
  ablation2_report_dir: "./data/ablation2"
  validation_split_percentage: 5
  train_samples: 0
  validation_samples: 500
  preprocessing_num_workers: 1

seed: 42
torch_compile: false

experiments:
  active: "ablation2"
  profiles:
    baseline:
      training:
        output_dir: "./models/checkpoints/sft_toolace_baseline"
      data:
        processed_train_path: "./data/train/train_baseline"
        processed_validation_path: "./data/eval/eval_baseline"
    ablation1:
      training:
        output_dir: "./models/checkpoints/sft_ablation1_parameter_shuffle_rename"
      data:
        processed_train_path: "./data/train/train_abalation1_parameter"
        processed_validation_path: "./data/eval/eval_abalation1_parameter"
    ablation2:
      training:
        output_dir: "./models/checkpoints/sft_ablation2_param_func_refusal_teacher"
      data:
        structured_dataset_path: "./data/tool_ace_processed"
        refusal_teacher_dataset_path: "./data/ablation_refusal_teacher_deepseek/dataset"
        processed_train_path: "./data/train/train_abalation2_param_func_refusal_teacher"
        processed_validation_path: "./data/eval/eval_abalation2_param_func_refusal_teacher"
        ablation2_report_dir: "./data/ablation2"
