# GRPO Training Configuration for Llama3.2-1B-Instruct

model:
  model_name_or_path: "./models/checkpoints/sft"  # Use SFT model as base
  cache_dir: "./models/pretrained"

training:
  output_dir: "./models/final"
  num_train_epochs: 2
  per_device_train_batch_size: 1  # GRPO is memory intensive
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  lr_scheduler_type: "constant"
  max_grad_norm: 1.0

grpo:
  num_generations: 4  # Generate 4 candidates per prompt
  temperature: 0.7
  top_p: 0.95
  reward_signal: "length_penalized_likelihood"  # Implicit reward
  beta: 0.01  # KL divergence penalty coefficient
  max_new_tokens: 256

optimization:
  optim: "paged_adamw_8bit"
  fp16: true
  gradient_checkpointing: true
  max_seq_length: 512

lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "v_proj"]
  lora_bias: "none"
  task_type: "CAUSAL_LM"

logging:
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  save_total_limit: 2
  log_level: "info"
  report_to: ["tensorboard", "wandb"]

data:
  dataset_name: "glaive-function-calling-v2"
  validation_split_percentage: 10

seed: 42
torch_compile: false
